<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://github.com/SpeedyPL/Images_Testing/blob/main/icon_placeholder.png?raw=true">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: black;
            height: 100vh;
            resize: none;
        }
        
        header {
            color: #ff0000;
            font-size: 1.5rem;
            width: 100%;
            text-align: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background-color: rgba(51, 51, 51, 0.484);
            padding: 0px;
            font-family: 'Creepster', cursive;
        }
        
        header button{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 1%;
            z-index: 9999;
            background-color: #ff0000;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            padding: 1.5% 2.5%;
            cursor: pointer;
            font-size: 100%;
        }
#disqus_thread {
    margin-top: 5%;
    margin-bottom: 20px;
    padding: 20px;
    box-sizing: border-box;
}

    @media screen and (max-height: 600px) {
            header {
                font-size: 1rem;
            }
        }
    @media screen and (max-width: 935px) {
            header {
                font-size: 1.5rem;
            }
        }
    @media screen and (max-width: 768px) {
            header {
                font-size: 1rem;
            }
        }
    @media screen and (max-width: 540px) {
            header {
                font-size: 1rem;
            }
        }
    @media screen and (max-width: 445px) {
            header {
                font-size: 0.8rem;
            }
        }
    @media screen and (max-width: 280px) {            
            header {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>COMMENTS</h1>
        <button onclick="window.location.href='https://speedypl.github.io/HorrorGame/'">Go back</button>
    </header>
    <div style="height: 10vh;"></div>
    <div id="disqus_thread"></div>
<script>
    (function() {
    var d = document, s = d.createElement('script');
    s.src = 'https://horror-game.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
    })();
</script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</body>
</html>
